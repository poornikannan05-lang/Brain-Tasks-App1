apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-tasks-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: brain-tasks-app

  template:
    metadata:
      labels:
        app: brain-tasks-app

    spec:
      containers:
      - name: brain-tasks-app

        image: public.ecr.aws/t5e7w0l5/mylogo

        ports:
        - containerPort: 80
